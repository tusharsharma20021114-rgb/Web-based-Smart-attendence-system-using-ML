{% extends "base.html" %}

{% block title %}Upload Images - Smart Attendance{% endblock %}

{% block content %}
<div class="page-container">
    <div class="page-header">
        <h1><i class="fas fa-camera"></i> Upload Training Images</h1>
        <p>Capture 30 images of your face for recognition training</p>
    </div>

    <div class="single-card-container">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-video"></i> Camera Capture
            </div>
            <div class="card-body">
                <div class="camera-container">
                    <video id="video" autoplay playsinline></video>
                    <canvas id="canvas" style="display: none;"></canvas>
                    <div class="camera-overlay" id="cameraOverlay">
                        <i class="fas fa-video"></i>
                        <p>Click "Start Camera" to begin</p>
                    </div>
                </div>
                
                <div class="capture-info">
                    <div class="capture-count">
                        <span>Images Captured:</span>
                        <strong id="imageCount">0 / 30</strong>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="captureProgress" style="width: 0%">0%</div>
                    </div>
                </div>
                
                <div class="button-group">
                    <button class="btn btn-success btn-lg" onclick="startCamera()">
                        <i class="fas fa-video"></i> Start Camera
                    </button>
                    <button class="btn btn-primary btn-lg" onclick="captureImages()" id="captureBtn" disabled>
                        <i class="fas fa-camera"></i> Capture Images
                    </button>
                    <button class="btn btn-danger btn-lg" onclick="stopCamera()">
                        <i class="fas fa-stop"></i> Stop
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let video = document.getElementById('video');
    let canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');
    let stream = null;
    let captureInterval = null;
    let imageCount = 0;
    let currentStudent = { name: '', roll: '' };

    // Start camera
    async function startCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 640, height: 480 } 
            });
            video.srcObject = stream;
            document.getElementById('cameraOverlay').style.display = 'none';
            document.getElementById('captureBtn').disabled = false;
            showNotification('Camera started', 'success');
        } catch (error) {
            showNotification('Camera access denied: ' + error.message, 'error');
        }
    }

    // Stop camera
    function stopCamera() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
            document.getElementById('cameraOverlay').style.display = 'flex';
            document.getElementById('captureBtn').disabled = true;
        }
        if (captureInterval) {
            clearInterval(captureInterval);
        }
    }

    // Capture images
    function captureImages() {
        currentStudent.name = document.getElementById('studentName').value;
        currentStudent.roll = document.getElementById('rollNumber').value;
        
        if (!currentStudent.name || !currentStudent.roll) {
            showNotification('Please save student information first', 'error');
            return;
        }
        
        imageCount = 0;
        document.getElementById('captureBtn').disabled = true;
        
        captureInterval = setInterval(async () => {
            if (imageCount >= 30) {
                clearInterval(captureInterval);
                document.getElementById('captureBtn').disabled = false;
                showNotification('Image capture completed!', 'success');
                stopCamera();
                return;
            }
            
            // Capture frame
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            
            const imageData = canvas.toDataURL('image/jpeg');
            imageCount++;
            
            // Update UI
            document.getElementById('imageCount').textContent = `${imageCount} / 30`;
            document.getElementById('captureProgress').style.width = `${(imageCount/30)*100}%`;
            
            // Save image
            await fetch('/api/students/save-image', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: currentStudent.name,
                    roll_number: currentStudent.roll,
                    image: imageData,
                    count: imageCount
                })
            });
        }, 300);
    }

    // Enroll student
    document.getElementById('enrollForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const name = document.getElementById('studentName').value;
        const rollNumber = document.getElementById('rollNumber').value;
        
        try {
            const response = await fetch('/api/students/enroll', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, roll_number: rollNumber })
            });
            
            const result = await response.json();
            
            if (result.success) {
                showNotification('Student enrolled successfully!', 'success');
                loadStudents();
            } else {
                showNotification('Enrollment failed: ' + result.error, 'error');
            }
        } catch (error) {
            showNotification('Error: ' + error.message, 'error');
        }
    });

    // Load students list
    async function loadStudents() {
        try {
            const response = await fetch('/api/students');
            const data = await response.json();
            
            const tbody = document.getElementById('studentsList');
            tbody.innerHTML = '';
            
            data.students.forEach(student => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${student['Roll Number']}</td>
                    <td>${student.Name}</td>
                    <td><span class="badge badge-success">30</span></td>
                    <td><span class="badge badge-info">Enrolled</span></td>
                `;
            });
        } catch (error) {
            console.error('Error loading students:', error);
        }
    }

    loadStudents();
</script>
{% endblock %}


<script>
    let video = document.getElementById('video');
    let canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');
    let stream = null;
    let captureInterval = null;
    let imageCount = 0;
    let capturedImages = [];

    async function startCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 640, height: 480 } 
            });
            video.srcObject = stream;
            document.getElementById('cameraOverlay').style.display = 'none';
            document.getElementById('captureBtn').disabled = false;
            showNotification('Camera started', 'success');
        } catch (error) {
            showNotification('Camera access denied: ' + error.message, 'error');
        }
    }

    function stopCamera() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
            document.getElementById('cameraOverlay').style.display = 'flex';
            document.getElementById('captureBtn').disabled = true;
        }
        if (captureInterval) clearInterval(captureInterval);
    }

    function captureImages() {
        imageCount = 0;
        capturedImages = [];
        document.getElementById('captureBtn').disabled = true;
        
        captureInterval = setInterval(() => {
            if (imageCount >= 30) {
                clearInterval(captureInterval);
                document.getElementById('captureBtn').disabled = false;
                saveAllImages();
                return;
            }
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            
            const imageData = canvas.toDataURL('image/jpeg');
            capturedImages.push(imageData);
            imageCount++;
            
            const progress = (imageCount / 30) * 100;
            document.getElementById('imageCount').textContent = `${imageCount} / 30`;
            document.getElementById('captureProgress').style.width = `${progress}%`;
            document.getElementById('captureProgress').textContent = `${Math.round(progress)}%`;
        }, 300);
    }

    async function saveAllImages() {
        showNotification('Saving images...', 'info');
        
        try {
            const response = await fetch('/api/students/save-images', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ images: capturedImages })
            });
            
            const result = await response.json();
            
            if (result.success) {
                showNotification('All images saved successfully!', 'success');
                stopCamera();
                imageCount = 0;
                capturedImages = [];
                document.getElementById('imageCount').textContent = '0 / 30';
                document.getElementById('captureProgress').style.width = '0%';
                document.getElementById('captureProgress').textContent = '0%';
            } else {
                showNotification('Failed to save images: ' + result.error, 'error');
            }
        } catch (error) {
            showNotification('Error: ' + error.message, 'error');
        }
    }
</script>
{% endblock %}
